name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          password: ${{ secrets.DO_PASSWORD }}
          script: |
            cd /opt/apex-brain-v2
            curl -L -o repo.zip "https://github.com/${{ github.repository }}/archive/refs/heads/main.zip"
            unzip -o repo.zip
            cp -r apex-brain-v2-main/* .
            rm -rf apex-brain-v2-main repo.zip
            npm install --production
            npm run build
            pm2 restart apex
            echo "Deployed $(date)"
